services:
  htmlserver:
    build: .
    image: htmlserver:latest
    container_name: htmlserver
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - ADMIN_PASSWORD=changeme
      - SESSION_SECRET=replace-with-a-long-random-string
    volumes:
      - htmlserver_data:/app/data
      - htmlserver_projects:/app/projects

volumes:
  htmlserver_data:
  htmlserver_projects:
